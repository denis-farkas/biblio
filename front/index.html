<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblio API - Demo Client</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container py-4 py-md-5">
      <section class="p-4 p-md-5 mb-4 bg-light border rounded-4 hero-wrap">
        <div
          class="d-flex flex-column flex-lg-row gap-3 align-items-lg-end justify-content-between"
        >
          <div>
            <h1 class="display-6 fw-bold mb-2">
              Biblio API - Client pédagogique
            </h1>
            <p class="lead mb-0">
              Une mini landing page pour montrer l'usage de fetch avec
              authentification, lecture et création.
            </p>
          </div>
          <div class="api-box">
            <label for="apiBaseUrl" class="form-label mb-1">URL API</label>
            <input
              id="apiBaseUrl"
              class="form-control"
              type="url"
              value="http://localhost:3000"
            />
          </div>
        </div>
      </section>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <h2 class="h4 mb-3">Sign up</h2>
              <form id="signupForm" class="vstack gap-2">
                <input
                  class="form-control"
                  name="surname"
                  type="text"
                  placeholder="Nom (surname)"
                  required
                />
                <input
                  class="form-control"
                  name="email"
                  type="email"
                  placeholder="Email"
                  required
                />
                <input
                  class="form-control"
                  name="password"
                  type="password"
                  placeholder="Mot de passe"
                  required
                />
                <select class="form-select" name="role">
                  <option value="user" selected>user</option>
                  <option value="admin">admin</option>
                </select>
                <button class="btn btn-primary" type="submit">
                  Créer un compte
                </button>
              </form>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-6">
          <section class="card border-0 shadow-sm h-100">
            <div class="card-body">
              <h2 class="h4 mb-3">Sign in</h2>
              <form id="signinForm" class="vstack gap-2">
                <input
                  class="form-control"
                  name="email"
                  type="email"
                  placeholder="Email"
                  required
                />
                <input
                  class="form-control"
                  name="password"
                  type="password"
                  placeholder="Mot de passe"
                  required
                />
                <button class="btn btn-success" type="submit">
                  Se connecter
                </button>
              </form>
              <div class="mt-3 p-2 rounded small" id="authState">
                Aucun token enregistré.
              </div>
            </div>
          </section>
        </div>

        <div class="col-12">
          <section class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h4 mb-0">Livres disponibles</h2>
                <button
                  id="reloadBooksBtn"
                  class="btn btn-outline-secondary btn-sm"
                  type="button"
                >
                  Rafraichir
                </button>
              </div>
              <div id="booksList" class="row g-3"></div>
            </div>
          </section>
        </div>

        <div class="col-12">
          <section class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-3">Ajouter un livre</h2>
              <form id="bookForm" class="row g-2">
                <div class="col-12 col-md-6">
                  <input
                    class="form-control"
                    name="title"
                    type="text"
                    placeholder="Titre"
                    required
                  />
                </div>
                <div class="col-12 col-md-6">
                  <input
                    class="form-control"
                    name="autor"
                    type="text"
                    placeholder="Auteur"
                    required
                  />
                </div>
                <div class="col-12">
                  <textarea
                    class="form-control"
                    name="resume"
                    rows="3"
                    placeholder="Résumé"
                    required
                  ></textarea>
                </div>
                <div class="col-12 col-md-4">
                  <input
                    class="form-control"
                    name="published_at"
                    type="date"
                    required
                  />
                </div>
                <div class="col-12 col-md-8">
                  <input
                    class="form-control"
                    name="cover"
                    type="url"
                    placeholder="URL de la couverture"
                    required
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label mb-1" for="genreSelect"
                    >Genre existant</label
                  >
                  <select
                    class="form-select"
                    id="genreSelect"
                    name="genreSelect"
                    required
                  >
                    <option value="">Chargement des genres...</option>
                  </select>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label mb-1" for="newGenre"
                    >Ou ajouter un genre</label
                  >
                  <input
                    class="form-control"
                    id="newGenre"
                    name="newGenre"
                    type="text"
                    placeholder="Ex: Fantaisie"
                  />
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      id="verified"
                      name="verified"
                      type="checkbox"
                    />
                    <label class="form-check-label" for="verified"
                      >Livre vérifié</label
                    >
                  </div>
                </div>
                <div class="col-12">
                  <button class="btn btn-dark" type="submit">
                    Créer le livre
                  </button>
                </div>
              </form>
            </div>
          </section>
        </div>
      </div>

      <section class="mt-4">
        <h2 class="h5">Logs et réponses API</h2>
        <pre id="apiLog" class="api-log"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
